# Hot Tub TOU Schedule -- self-healing setpoint control
#
# Applies sensor.hot_tub_expected_setpoint (the single source of truth for the
# time-of-use schedule, driven by the two seasonal sliders in helpers.yaml) to
# the tub whenever the expected value changes, HA starts, the ESP32 reconnects,
# or the thermal-runaway flag clears.
#
# Because it re-applies on all of those, a transient ESP32 offline or an HA
# restart no longer permanently stops the schedule -- it self-corrects on
# recovery. This replaces the old fixed six-time-trigger design and the
# "disable the automation on offline/severe" recovery model (see stale_data.yaml
# and thermal_runaway.yaml; reverses the manual-re-enable decisions D-08/D-12).
#
# Safety gates are CONDITIONS, not disables, so they self-clear:
#   - thermal_runaway_active must be off   (SAFE-02, D-06)
#   - ESP32 must be online                 (no acting on stale data, SAFE-03)

automation:
  - id: hot_tub_tou_schedule
    alias: Hot Tub TOU Schedule
    description: >
      Applies the expected TOU setpoint (sensor.hot_tub_expected_setpoint, driven
      by the max/coast sliders) whenever it changes, on HA start, on ESP32
      reconnect, or when the thermal-runaway flag clears. Self-healing: recovers
      automatically instead of staying disabled.
    mode: single
    trigger:
      - platform: state
        entity_id: sensor.hot_tub_expected_setpoint
        id: expected_changed
      - platform: homeassistant
        event: start
        id: ha_start
      - platform: state
        entity_id: binary_sensor.tublemetry_hot_tub_api_status
        to: "on"
        id: esp32_online
      - platform: state
        entity_id: input_boolean.thermal_runaway_active
        to: "off"
        id: runaway_cleared
    condition:
      # Block setpoint changes when thermal runaway is active (SAFE-02, D-06)
      - condition: state
        entity_id: input_boolean.thermal_runaway_active
        state: "off"
      # Refuse to act on stale data -- ESP32 must be online (SAFE-03)
      - condition: state
        entity_id: binary_sensor.tublemetry_hot_tub_api_status
        state: "on"
      # Only apply a valid, in-range expected setpoint (guards startup 'unknown')
      - condition: template
        value_template: >
          {{ states('sensor.hot_tub_expected_setpoint') | int(0) >= 80
             and states('sensor.hot_tub_expected_setpoint') | int(0) <= 104 }}
    action:
      - action: number.set_value
        target:
          entity_id: number.tublemetry_hot_tub_setpoint
        data:
          value: "{{ states('sensor.hot_tub_expected_setpoint') | int }}"
