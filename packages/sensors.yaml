# sensors.yaml -- DEPRECATED (duplicate of thermal_model.yaml)
#
# This file previously defined the "Hot Tub Heating Rate" and "Hot Tub Cooling
# Rate" sql sensors, which are ALSO defined in thermal_model.yaml. Loading both
# as HA packages registered the entities twice, so the second copy showed up as
# sensor.hot_tub_heating_rate_2 / _cooling_rate_2.
#
# thermal_model.yaml is the single source of truth for those sensors (it also
# carries the preheat template sensors, the rate snapshots, and the daily refresh
# automation). The duplicate sql: block here has been removed.
#
# This file is retained comment-only (like heating_tracker.yaml) so nothing that
# references the filename breaks. It is not loaded as an HA package. A single HA
# restart is needed to drop the stale ..._2 entities from the registry.
