template:
  - sensor:
      - name: Outdoor Temperature
        unit_of_measurement: "°F"
        state: "{{ state_attr('weather.forecast_home', 'temperature') }}"
        device_class: temperature
        state_class: measurement

      # Single source of truth for the TOU schedule. Given the time of day and
      # weekday, this is the setpoint the tub SHOULD be at right now, driven by
      # the two seasonal sliders. tou_automation.yaml applies whatever this
      # reports; tou_watchdog.yaml alerts if the commanded setpoint drifts from
      # it. now() re-renders every minute, so boundaries flip within ~60s.
      #
      # Schedule (weekday):  04:30-10:00 max | 10:00-17:30 coast |
      #   17:30-19:00 max-2 (evening preheat) | 19:00-22:00 max | 22:00-04:30 coast
      # Schedule (weekend):  05:00-22:00 max | 22:00-05:00 coast
      - name: "Hot Tub Expected Setpoint"
        unit_of_measurement: "°F"
        icon: mdi:thermometer-auto
        state: >-
          {% set maxsp = states('input_number.hot_tub_max_setpoint') | int(104) %}
          {% set coast = states('input_number.hot_tub_coast_setpoint') | int(96) %}
          {% set hm = now().hour * 60 + now().minute %}
          {% set wd = now().weekday() %}
          {% if wd < 5 %}
          {%   if 270 <= hm < 600 %}{% set sp = maxsp %}
          {%   elif 600 <= hm < 1050 %}{% set sp = coast %}
          {%   elif 1050 <= hm < 1140 %}{% set sp = maxsp - 2 %}
          {%   elif 1140 <= hm < 1320 %}{% set sp = maxsp %}
          {%   else %}{% set sp = coast %}
          {%   endif %}
          {% else %}
          {%   if 300 <= hm < 1320 %}{% set sp = maxsp %}
          {%   else %}{% set sp = coast %}
          {%   endif %}
          {% endif %}
          {{ sp }}

      # NOTE: "Hot Tub Preheat Minutes" and "Hot Tub Preheat ETA" are defined in
      # thermal_model.yaml (its single source, alongside the heating/cooling rate
      # sensors they depend on). They were removed from here to stop the
      # duplicate ..._2 registration.
