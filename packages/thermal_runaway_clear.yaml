# Thermal Runaway Auto-Clear
#
# Clears the thermal_runaway_active flag once the danger has resolved: the heater
# is OFF (nothing is driving the temperature up) AND water is below the safety
# ceiling (107F). Sustained 3 minutes.
#
# This replaces the old "water <= setpoint" clear, which deadlocked: a severe
# event floors the setpoint to 80F, and summer water never cools to 80F, so the
# flag never cleared. Heater-off + below-ceiling reliably clears after a real or
# spurious event, yet stays latched during a genuine stuck-heater fault (heater
# never reads off), keeping the schedule blocked and alerts firing.
#
# The TOU schedule stays enabled throughout (it is gated by the flag as a
# CONDITION, not disabled), so clearing the flag lets the schedule re-apply the
# correct setpoint immediately via its runaway_cleared trigger. Recovery is
# automatic for both moderate and severe events.

automation:
  - alias: Hot Tub Thermal Runaway Clear
    description: >
      Clears thermal_runaway_active once the heater is off and water is below the
      107F ceiling for 3 minutes. The TOU schedule re-applies the correct setpoint
      automatically once the flag clears (via its runaway_cleared trigger).
    mode: single

    trigger:
      - platform: template
        value_template: >
          {{ states('binary_sensor.tublemetry_hot_tub_heater') == 'off'
             and states('sensor.tublemetry_hot_tub_temperature') | float(999) < 107 }}
        for:
          minutes: 3

    condition:
      - condition: state
        entity_id: input_boolean.thermal_runaway_active
        state: "on"
      - condition: template
        value_template: >
          {{ states('sensor.tublemetry_hot_tub_temperature') not in ['unknown', 'unavailable']
             and states('binary_sensor.tublemetry_hot_tub_heater') not in ['unknown', 'unavailable'] }}
      - condition: state
        entity_id: binary_sensor.tublemetry_hot_tub_api_status
        state: "on"

    action:
      - action: input_boolean.turn_off
        target:
          entity_id: input_boolean.thermal_runaway_active
      - action: persistent_notification.create
        data:
          title: "THERMAL RUNAWAY CLEARED - Hot Tub"
          message: >
            Heater is off and water
            {{ states('sensor.tublemetry_hot_tub_temperature') }}F is below the
            107F ceiling. Runaway flag cleared. The TOU schedule has resumed and
            re-applied the current setpoint.
          notification_id: thermal_cleared
